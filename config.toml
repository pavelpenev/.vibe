active_model = "small-model"
vim_keybindings = false
disable_welcome_banner_animation = false
autocopy_to_clipboard = true
file_watcher_for_autocomplete = false
displayed_workdir = ""
context_warnings = false
voice_mode_enabled = false
narrator_enabled = false
active_transcribe_model = "voxtral-realtime"
active_tts_model = "voxtral-tts"
bypass_tool_permissions = false
enable_telemetry = true
system_prompt_id = "system-prompt-large"
include_commit_signature = false
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_auto_update = true
enable_notifications = true
api_timeout = 720.0
auto_compact_threshold = 800000
compaction_prompt_id = "compact-v3"
tool_paths = []
mcp_servers = []
connectors = []
enabled_tools = []
disabled_tools = []
enabled_agents = []
disabled_agents = [
    "explore",
]
installed_agents = []
default_agent = "default"
enabled_skills = [
    "skill-creator",
    "deep-research",
    "project-planner",
    "auto-task",
    "code-review",
    "test-generator",
    "debugging",
    "git-workflow",
    "web-search",
    "subagent-creator",
]
disabled_skills = []
enable_experimental_hooks = true
applied_migrations = [
    "bash_read_only_defaults_v1",
]

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
browser_auth_base_url = "https://console.mistral.ai"
browser_auth_api_base_url = "https://console.mistral.ai/api"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[providers.extra_headers]

[[providers]]
name = "opencode"
api_base = "https://opencode.ai/zen/go/v1"
api_key_env_var = "OPENCODE_API_KEY"
api_style = "openai"
backend = "generic"

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
input_price = 1.5
output_price = 7.5
thinking = "high"
supports_images = true
auto_compact_threshold = 200000

[[models]]
name = "mistral-small-latest"
provider = "mistral"
alias = "mistral-small-4"
input_price = 0.15
output_price = 0.6
thinking = "high"
auto_compact_threshold = 200000

[[models]]
name = "glm-5.2"
provider = "opencode"
alias = "glm-5.2"
input_price = 1.4
output_price = 4.4
auto_compact_threshold = 800000
thinking = "high"

[[models]]
name = "deepseek-v4-pro"
provider = "opencode"
alias = "deepseek-v4-pro"
input_price = 1.74
output_price = 3.48
auto_compact_threshold = 800000
thinking = "high"

[[models]]
name = "deepseek-v4-flash"
provider = "opencode"
alias = "small-model"
input_price = 0.14
output_price = 0.28
auto_compact_threshold = 800000
thinking = "high"

[[transcribe_providers]]
name = "mistral"
api_base = "wss://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[transcribe_models]]
name = "voxtral-mini-transcribe-realtime-2602"
provider = "mistral"
alias = "voxtral-realtime"
sample_rate = 16000
encoding = "pcm_s16le"
language = "en"
target_streaming_delay_ms = 500

[[tts_providers]]
name = "mistral"
api_base = "https://api.mistral.ai"
api_key_env_var = "MISTRAL_API_KEY"
client = "mistral"

[[tts_models]]
name = "voxtral-mini-tts-latest"
provider = "mistral"
alias = "voxtral-tts"
voice = "gb_jane_neutral"
response_format = "wav"

[project_context]
default_commit_count = 5
timeout_seconds = 2.0

[session_logging]
session_prefix = "session"
enabled = true

[tools.skill]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.web_search]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = []
timeout = 120
model = "mistral-vibe-cli-with-tools"

[tools.write_file]
permission = "ask"
allowlist = [
    "/tmp/*",
]
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_write_bytes = 64000
create_parent_dirs = true

[tools.todo]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []
max_todos = 100

[tools.task]
permission = "ask"
allowlist = [
    "code-reviewer",
    "lisp-editor",
    "finder",
    "explorer",
    "file-editor",
    "researcher",
    "summarizer",
    "script-manager",
    "context-restorer",
    "advisor",
    "verifier",
]
denylist = []
sensitive_patterns = []

[tools.exit_plan_mode]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.ask_user_question]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = []

[tools.web_fetch]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = []
default_timeout = 30
max_timeout = 120
max_content_bytes = 120000
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

[tools.bash]
permission = "ask"
allowlist = [
    "awk",
    "basename",
    "cat",
    "cd",
    "comm",
    "cut",
    "date",
    "diff",
    "dirname",
    "du",
    "echo",
    "ffprobe",
    "file",
    "find",
    "fmt",
    "fold",
    "git diff",
    "git init",
    "git log",
    "git status",
    "grep",
    "head",
    "join",
    "less",
    "ls",
    "md5sum",
    "mkdir",
    "more",
    "nl",
    "od",
    "paste",
    "pip show",
    "pwd",
    "python --version",
    "readlink",
    "sha1sum",
    "sha256sum",
    "shasum",
    "sleep",
    "sort",
    "stat",
    "sum",
    "tac",
    "tail",
    "timeout",
    "tr",
    "tree",
    "uname",
    "uniq",
    "wc",
    "which",
    "whoami",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "bash -i",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
sensitive_patterns = [
    "sudo",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.grep]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.edit]
permission = "ask"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
fuzzy_threshold = 0.98

[tools.read_file]
permission = "always"
allowlist = []
denylist = []
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
