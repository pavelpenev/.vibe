agent_type = "subagent"
display_name = "Finder"
description = "Search for patterns across files using grep/find commands"
safety = "safe"
active_model = "mistral-small-4"
system_prompt_id = "finder"
enabled_tools = ["grep", "bash"]

[tools.grep]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
  "grep",
  "rg",
  "ag",
  "find . -name",
  "find . -iname",
  "find . -type",
]
