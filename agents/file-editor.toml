agent_type = "subagent"
display_name = "File Editor"
description = "Batch file creation, modification, and deletion for text-based files (Python, JSON, YAML, Markdown, etc.)"
safety = "neutral"
active_model = "small-model"
system_prompt_id = "file-editor"
enabled_tools = ["read_file", "write_file", "edit", "bash"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "always"

[tools.edit]
permission = "always"

[tools.bash]
permission = "ask"
allowlist = [
  "mv",
  "cp",
  "touch",
  "mkdir -p",
  "wc -l"
]
